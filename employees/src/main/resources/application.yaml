server:
  port: 3002
  servlet:
    context-path: /v1/api
spring:
  application:
    name: employees-service
  datasource:
    url: jdbc:postgresql://localhost:5432/employees-db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true